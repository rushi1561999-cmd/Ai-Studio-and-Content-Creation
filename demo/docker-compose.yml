services:
  mysql:
    image: mysql:8.0
    container_name: aistudio-mysql
    environment:
      MYSQL_DATABASE: cdac
      MYSQL_USER: demo
      MYSQL_PASSWORD: demopass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  backend:
    build: ./demo
    container_name: aistudio-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cdac
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demopass
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_FRONTEND_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081/api
    container_name: aistudio-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
